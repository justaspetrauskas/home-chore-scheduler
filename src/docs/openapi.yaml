openapi: 3.0.3
info:
  title: Home Chore Scheduler API
  version: 1.0.0
  description: API documentation for the chore management backend.
servers:
  - url: http://localhost:5050/api-docs
    description: Local development server
tags:
  - name: Auth
    description: Authentication and login endpoints
  - name: Users
    description: User management
  - name: Households
    description: Household management
  - name: HouseholdMembers
    description: Memberships in households
  - name: Rooms
    description: Room management
  - name: Chores
    description: Chore management
  - name: CleaningEvents
    description: Cleaning event scheduling
  - name: TaskAssignments
    description: Chore/task assignments

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      $ref: "./schemas/user.yaml"
    Household:
      $ref: "./schemas/household.yaml"
    HouseholdMember:
      $ref: "./schemas/householdMember.yaml"
    Room:
      $ref: "./schemas/room.yaml"
    Chore:
      $ref: "./schemas/chore.yaml"
    CleaningEvent:
      $ref: "./schemas/cleaningEvent.yaml"
    TaskAssignment:
      $ref: "./schemas/taskAssignment.yaml"
    Auth:
      $ref: "./schemas/auth.yaml"

