type: object
properties:
  id:
    type: string
    format: uuid
    example: "f1a2b3c4-d5e6-7890-abcd-1234567890ef"
  title:
    type: string
    example: "Spring Cleaning"
  date:
    type: string
    format: date-time
    example: "2024-04-01T10:00:00Z"
  householdId:
    type: string
    format: uuid
  createdById:
    type: string
    format: uuid
  createdAt:
    type: string
    format: date-time
    example: "2024-03-08T12:34:56Z"
  tasks:
    type: array
    items:
      type: string
    description: "Array of TaskAssignment IDs"
