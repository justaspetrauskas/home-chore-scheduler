type: object
properties:
  id:
    type: string
    format: uuid
    example: "a1b2c3d4-e5f6-7890-abcd-1234567890ef"
  name:
    type: string
    example: "Smith Family"
  ownerId:
    type: string
    format: uuid
    example: "b1a2c3d4-e5f6-7890-abcd-1234567890ef"
  createdAt:
    type: string
    format: date-time
    example: "2024-03-08T12:34:56Z"
  members:
    type: array
    items:
      type: string
    description: "Array of HouseholdMember IDs"
  rooms:
    type: array
    items:
      type: string
    description: "Array of Room IDs"
  events:
    type: array
    items:
      type: string
    description: "Array of CleaningEvent IDs"
