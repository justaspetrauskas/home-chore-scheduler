schemas:
  User:
    type: object
    properties:
      id:
        type: string
        format: uuid
        example: "b1a2c3d4-e5f6-7890-abcd-1234567890ef"
      name:
        type: string
        example: "John Doe"
      email:
        type: string
        example: "john@example.com"
      createdAt:
        type: string
        format: date-time
        example: "2024-03-08T12:34:56Z"
