type: object
properties:
  id:
    type: string
    format: uuid
    example: "e1f2a3b4-c5d6-7890-abcd-1234567890ef"
  title:
    type: string
    example: "Vacuum Living Room"
  description:
    type: string
    example: "Vacuum the entire living room and hallway."
    nullable: true
  points:
    type: integer
    example: 5
  roomId:
    type: string
    format: uuid
    nullable: true
  createdById:
    type: string
    format: uuid
  createdAt:
    type: string
    format: date-time
    example: "2024-03-08T12:34:56Z"
  assignments:
    type: array
    items:
      type: string
    description: "Array of TaskAssignment IDs"
