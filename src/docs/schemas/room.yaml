type: object
properties:
  id:
    type: string
    format: uuid
    example: "d1e2f3a4-b5c6-7890-abcd-1234567890ef"
  name:
    type: string
    example: "Kitchen"
  householdId:
    type: string
    format: uuid
  createdById:
    type: string
    format: uuid
  createdAt:
    type: string
    format: date-time
    example: "2024-03-08T12:34:56Z"
  tasks:
    type: array
    items:
      type: string
    description: "Array of TaskAssignment IDs"
  chores:
    type: array
    items:
      type: string
    description: "Array of Chore IDs"
