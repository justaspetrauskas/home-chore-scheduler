/users:
  get:
    summary: List all users
    tags:
      - Users
    security:
      - bearerAuth: []
    responses:
      200:
        description: List of users
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  example: success
                data:
                  type: object
                  properties:
                    users:
                      type: array
                      items:
                        $ref: '../schemas/user.yaml'

/users/me:
  get:
    summary: Get current user profile
    tags:
      - Users
    security:
      - bearerAuth: []
    responses:
      200:
        description: Current user profile
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  example: success
                data:
                  type: object
                  properties:
                    user:
                      $ref: '../schemas/user.yaml'
      404:
        description: User not found

/users/{id}:
  get:
    summary: Get user by ID
    tags:
      - Users
    security:
      - bearerAuth: []
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
        description: The user's unique ID
    responses:
      200:
        description: User found
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  example: success
                data:
                  type: object
                  properties:
                    user:
                      $ref: '../schemas/user.yaml'
      403:
        description: Not allowed to view this user
      404:
        description: User not found
  put:
    summary: Update user by ID
    tags:
      - Users
    security:
      - bearerAuth: []
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
        description: The user's unique ID
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              name:
                type: string
    responses:
      200:
        description: User updated
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  example: success
                data:
                  type: object
                  properties:
                    user:
                      $ref: '../schemas/user.yaml'
      403:
        description: Not allowed to update this user
      404:
        description: User not found
  delete:
    summary: Delete user by ID
    tags:
      - Users
    security:
      - bearerAuth: []
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
        description: The user's unique ID
    responses:
      200:
        description: User deleted
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  example: success
                message:
                  type: string
                  example: User deleted successfully
      403:
        description: Not allowed to delete this user
      404:
        description: User not found