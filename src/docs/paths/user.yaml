get:
  summary: Get user by ID
  tags:
    - User
  parameters:
    - in: path
      name: userId
      required: true
      schema:
        type: string
      description: The user's unique ID
  responses:
    200:
      description: User found
      content:
        application/json:
          schema:
            $ref: '../schemas/user.yaml#/schemas/User'
    404:
      description: User not found
