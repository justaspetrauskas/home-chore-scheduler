login:
  post:
    summary: User login
    tags:
      - Auth
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              email:
                type: string
                example: "john@example.com"
              password:
                type: string
                example: "password123"
    responses:
      200:
        description: Successful login
        content:
          application/json:
            schema:
              $ref: '../schemas/auth.yaml#/schemas/Auth'
      401:
        description: Invalid credentials
